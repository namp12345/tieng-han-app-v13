<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>K-Tour Guide v6</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>K-Tour Guide v6</h1>
      <p>Học phản xạ theo khung giờ trong ngày</p>
    </header>

    <nav class="top-nav">
      <button class="nav-tab active" data-view="learn">Học</button>
      <button class="nav-tab" data-view="quiz">Quiz</button>
      <button class="nav-tab" data-view="review">Ôn tập</button>
      <button class="nav-tab" data-view="stats">Thống kê</button>
      <button class="nav-tab" data-view="settings">Cài đặt</button>
    </nav>

    <section id="controlPanel" class="controls">
      <input id="searchInput" type="search" placeholder="Tìm cụm từ...">
      <div class="control-row">
        <select id="topicFilter"></select>
        <button id="randomBtn">Ngẫu nhiên</button>
      </div>
    </section>

    <section id="sessionPanel" class="session-panel"></section>

    <section id="progressPanel" class="progress">
      <strong id="progressText">0/0 đã học</strong>
      <div class="track"><div id="progressBar"></div></div>
      <p id="statsText">Yêu thích: 0 · Khó: 0</p>
    </section>

    <section id="viewRoot"></section>

    <template id="flashcardTemplate">
      <article class="FlashcardSentence">
        <div class="card-inner">
          <section class="FlashcardFront">
            <div class="front-head">
              <div class="SemanticImage" data-image>🧭</div>
              <span class="topic-chip" data-topic></span>
            </div>
            <div class="korean-row">
              <p class="korean" data-korean></p>
              <button class="AudioButton" data-front-audio>🔊</button>
            </div>
            <p class="roman" data-roman></p>
            <p class="vietnamese" data-vietnamese></p>

            <div class="FrontPracticePanel">
              <button data-action="listen">Nghe</button>
              <button data-action="listenSlow">Nghe chậm</button>
              <button data-action="record">Ghi âm</button>
              <button data-action="selfPlay">Nghe giọng tôi</button>
            </div>
            <p class="record-status" data-record-status>Chưa có bản ghi âm.</p>

            <div class="CompletionToggle">
              <span data-completion-label>Chưa hoàn thành</span>
              <button data-action="complete">Đã hoàn thành</button>
            </div>

            <button class="flip-zone" data-flip-zone>Chạm để lật xem phân tích</button>
            <button class="flip-btn" data-flip-btn>Lật thẻ</button>
          </section>

          <section class="FlashcardBack">
            <div class="back-top">
              <strong data-korean-back></strong>
              <button class="flip-btn" data-unflip>Quay lại</button>
            </div>
            <div class="tab-body" data-panel="analysis">
              <div class="AnalysisList" data-analysis></div>
              <div class="brief"><b>Nghĩa tự nhiên:</b> <span data-natural></span></div>
            </div>
          </section>
        </div>
      </article>
    </template>

    <template id="quizTemplate">
      <article class="QuizCard">
        <p class="quiz-title">Nghe và chọn nghĩa đúng</p>
        <div class="korean-row">
          <p class="quiz-korean" data-quiz-korean></p>
          <button class="AudioButton" data-quiz-audio>🔊</button>
        </div>
        <div class="quiz-options" data-quiz-options></div>
        <p class="quiz-result" data-quiz-result></p>
        <button class="quiz-next" data-quiz-next>Câu tiếp</button>
      </article>
    </template>
  </main>

  <script src="phrases.js"></script>
  <script src="app.js"></script>
</body>
</html>
